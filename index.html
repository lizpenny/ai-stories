<html lang="en">

<meta charset="UTF-8">

<title>Student Stories — CodePath × Claude</title>
<style>

  :root {
    --navy:       #1B1C57;
    --navy-2:     #062F54;
    --green:      #00C385;
    --white:      #FFFFFF;
    --periwinkle: #4F5DFF;
    --sky:        #E9F6FF;
    --bg:         #F5F6FA;
    --card:       #FFFFFF;
    --text:       #1B1C57;
    --muted:      #8B90B8;
    --shadow-sm:  0 1px 4px rgba(27,28,87,0.06), 0 4px 20px rgba(27,28,87,0.05);
    --shadow-md:  0 8px 32px rgba(27,28,87,0.11), 0 2px 8px rgba(27,28,87,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HERO ── */
  .hero {
    background: var(--navy);
    text-align: center;
    padding: 72px 20px 64px;
  }

  .hero-eyebrow {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 22px;
    opacity: 0.9;
  }

  .hero h1 {
    font-family: 'Space Mono', monospace;
    font-size: clamp(28px, 5vw, 54px);
    font-weight: 700;
    line-height: 1.12;
    color: #fff;
    letter-spacing: -0.02em;
    margin-bottom: 16px;
  }

  .hero h1 em {
    color: var(--green);
    font-style: normal;
  }

  .hero-sub {
    font-size: clamp(14px, 1.6vw, 17px);
    color: rgba(255,255,255,0.5);
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.7;
    font-weight: 300;
  }

  /* ── CONTROLS ── */
  .controls {
    max-width: 1160px;
    margin: 40px auto 28px;
    padding: 0 24px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 180px;
  }

  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    padding: 10px 16px 10px 40px;
    background: var(--white);
    border: none;
    border-radius: 100px;
    box-shadow: var(--shadow-sm);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: box-shadow 0.2s;
  }

  .search-input:focus { box-shadow: 0 0 0 2px var(--periwinkle), var(--shadow-sm); }
  .search-input::placeholder { color: var(--muted); }

  .filter-btns { display: flex; gap: 6px; flex-wrap: wrap; }

  .filter-btn {
    padding: 8px 15px;
    border-radius: 100px;
    border: none;
    background: var(--white);
    box-shadow: var(--shadow-sm);
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }

  .filter-btn:hover { color: var(--navy); box-shadow: var(--shadow-md); }
  .filter-btn.active { background: var(--navy); color: #fff; box-shadow: none; }

  /* ── GRID ── */
  .grid {
    max-width: 1160px;
    margin: 0 auto;
    padding: 0 24px 80px;
    columns: 3;
    column-gap: 18px;
  }

  @media (max-width: 900px) { .grid { columns: 2; } }
  @media (max-width: 560px) { .grid { columns: 1; } }

  /* ── CARD ── */
  .card {
    break-inside: avoid;
    background: var(--card);
    border-radius: 20px;
    margin-bottom: 18px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: transform 0.22s cubic-bezier(.25,.46,.45,.94), box-shadow 0.22s;
  }

  .card:hover {
    transform: translateY(-5px);
    box-shadow: var(--shadow-md);
  }

  .card-video-embed {
    position: relative;
    padding-bottom: 56.25%;
    background: var(--navy);
  }

  .card-video-embed iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  .card-video-placeholder {
    position: relative;
    padding-bottom: 56.25%;
    background: linear-gradient(145deg, #0F1040 0%, var(--navy) 100%);
    overflow: hidden;
  }

  .card-video-placeholder-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .play-circle {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.18s;
  }

  .card:hover .play-circle { background: rgba(0,195,133,0.18); border-color: var(--green); }
  .play-circle svg { margin-left: 3px; }

  .placeholder-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-family: 'Space Mono', monospace;
    color: rgba(255,255,255,0.3);
  }

  .card-body { padding: 22px; }

  .card-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--navy);
    line-height: 1.25;
    letter-spacing: -0.01em;
  }

  .card-course {
    display: inline-block;
    margin-top: 6px;
    font-size: 10px;
    font-weight: 700;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 100px;
    background: var(--sky);
    color: var(--periwinkle);
  }

  .card-quote {
    font-size: 14px;
    line-height: 1.68;
    color: #3A3C6E;
    font-weight: 400;
    font-style: italic;
    margin-top: 14px;
  }

  .card-quote::before {
    content: '\201C';
    font-size: 28px;
    line-height: 0;
    vertical-align: -10px;
    color: var(--green);
    font-style: normal;
    margin-right: 3px;
    font-family: Georgia, serif;
  }

  .cat-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 14px; }

  .tag {
    padding: 3px 10px;
    border-radius: 100px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }

  .tag-built   { background: #FFF0E6; color: #B84500; }
  .tag-ships   { background: #EEEEFF; color: #3340CC; }
  .tag-learns  { background: #E6FBF3; color: #006B4A; }
  .tag-arch    { background: #F4EEFF; color: #7820C8; }
  .tag-oss     { background: #E5F5FF; color: #005E99; }

  .card-footer {
    margin-top: 16px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }

  .read-more-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: none;
    border: none;
    color: var(--periwinkle);
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    padding: 0;
    opacity: 0.8;
    transition: opacity 0.15s;
  }

  .read-more-btn:hover { opacity: 1; }

  .card-links { display: flex; gap: 7px; margin-top: 14px; flex-wrap: wrap; }

  .card-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    border-radius: 100px;
    background: #F0FFF8;
    color: #007A54;
    font-size: 11px;
    font-weight: 600;
    text-decoration: none;
    transition: background 0.15s;
  }

  .card-link:hover { background: #CCFAEC; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,16,48,0.6);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s;
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--white);
    border-radius: 24px;
    max-width: 660px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 24px 80px rgba(15,16,48,0.2);
    transform: scale(0.97) translateY(12px);
    transition: transform 0.25s cubic-bezier(.25,.46,.45,.94);
  }

  .modal-overlay.open .modal { transform: scale(1) translateY(0); }

  .modal-header {
    padding: 24px 24px 20px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--white);
    z-index: 1;
    border-bottom: 1px solid #ECEEF6;
  }

  .modal-name { font-size: 18px; font-weight: 700; color: var(--navy); letter-spacing: -0.01em; }

  .modal-course-badge {
    display: inline-block;
    margin-top: 5px;
    font-size: 10px;
    font-weight: 700;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 100px;
    background: var(--sky);
    color: var(--periwinkle);
  }

  .modal-close {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: none;
    background: var(--bg);
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
  }

  .modal-close:hover { background: #ECEEF6; color: var(--navy); }

  .modal-body { padding: 24px; }

  .modal-video {
    position: relative;
    padding-bottom: 56.25%;
    background: var(--navy);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .modal-video iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  .modal-text {
    font-size: 15px;
    line-height: 1.82;
    color: #4A4D7E;
    white-space: pre-wrap;
  }

  .modal-links { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }

  .modal-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 7px 14px;
    border-radius: 100px;
    background: #F0FFF8;
    color: #007A54;
    font-size: 12px;
    font-weight: 600;
    text-decoration: none;
    transition: background 0.15s;
  }

  .modal-link:hover { background: #CCFAEC; }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    padding: 32px 20px;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.03em;
  }

  .footer strong { color: var(--navy); font-weight: 600; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #DDE0F0; border-radius: 4px; }

  .hidden { display: none !important; }
</style>
</head>

</div>

<!-- ── FOOTER ── -->
<footer class="footer">
  <strong>CodePath</strong> × Anthropic &nbsp;·&nbsp; Summer 2026

let activeFilter = 'all';
let searchQuery = '';

function getCatTags(s) {
  return (s.categories || []).map(c => {
    const def = CAT_LABELS[c];
    return def ? `<span class="tag ${def.tag}">${def.label}</span>` : '';
  }).join('');
}

function matchesFilter(s) {
  if (activeFilter === 'video') return s.type.includes('video');
  if (['built','ships','learns','arch','oss'].includes(activeFilter)) return (s.categories || []).includes(activeFilter);
  return true;
}

function matchesSearch(s) {
  if (!searchQuery) return true;
  const q = searchQuery.toLowerCase();
  return s.name.toLowerCase().includes(q) || s.story.toLowerCase().includes(q) || (s.course && s.course.toLowerCase().includes(q));
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const filtered = stories.filter(s => matchesFilter(s) && matchesSearch(s));
  grid.innerHTML = '';

  if (filtered.length === 0) {
    grid.innerHTML = '<div style="text-align:center;color:#6B6E9A;padding:80px 0;grid-column:1/-1">No stories match your search.</div>';
    return;
  }

  filtered.forEach((s, _i) => {
    const idx = stories.indexOf(s);
    const card = document.createElement('div');
    card.className = 'card' + (s.type.includes('video') ? ' has-video' : '');

    let videoHtml = '';
    if (s.videoUrl) {
      videoHtml = `<div class="card-video-embed"><iframe src="${s.videoUrl}" allowfullscreen allow="autoplay; fullscreen"></iframe></div>`;
    } else if (s.type.includes('video')) {
      videoHtml = `<div class="card-video-placeholder"><div class="card-video-placeholder-inner"><div class="play-circle"><svg width="18" height="18" viewBox="0 0 24 24" fill="rgba(255,255,255,0.5)"><polygon points="5,3 19,12 5,21"/></svg></div><div class="placeholder-label">Video coming soon</div></div></div>`;
    }

    const courseBadge = s.course ? `<span class="card-course">${s.course}</span>` : '';

    let linksHtml = '';
    if (s.links && !s.videoUrl) {
      linksHtml = `<div class="card-links">${s.links.map(l => `<a class="card-link" href="${l.url}" target="_blank" onclick="event.stopPropagation()">↗ ${l.label}</a>`).join('')}</div>`;
    }

    card.innerHTML = `
      ${videoHtml}
      <div class="card-body">
        <div class="card-header">
          <div class="card-name">${s.name}</div>
          ${courseBadge}
        </div>
        <p class="card-quote">"${s.quote}"</p>
        <div class="cat-tags">${getCatTags(s)}</div>
        ${linksHtml}
        <div class="card-footer" style="margin-top:12px;padding-top:12px;">
          ${s.story.length > 80 && !s.type.includes('video') ? `<button class="read-more-btn" onclick="openModal(${idx});event.stopPropagation()">Read full story →</button>` : `<button class="read-more-btn" onclick="openModal(${idx});event.stopPropagation()">View →</button>`}
        </div>
      </div>
    `;

    card.addEventListener('click', () => openModal(idx));
    grid.appendChild(card);
  });
}

function openModal(idx) {
  const s = stories[idx];
  document.getElementById('modal-name').textContent = s.name;

  const badge = document.getElementById('modal-course-badge');
  if (s.course) {
    badge.textContent = s.course;
    badge.classList.remove('hidden');
  } else {
    badge.classList.add('hidden');
  }

  const videoWrap = document.getElementById('modal-video-wrap');
  const iframe = document.getElementById('modal-iframe');
  if (s.videoUrl) {
    iframe.src = s.videoUrl;
    videoWrap.classList.remove('hidden');
    videoWrap.style.background = '';
    videoWrap.querySelector('.modal-placeholder')?.remove();
  } else if (s.type.includes('video')) {
    iframe.src = '';
    videoWrap.classList.remove('hidden');
    videoWrap.style.background = 'linear-gradient(135deg, #062F54, #1B1C57)';
    if (!videoWrap.querySelector('.modal-placeholder')) {
      const ph = document.createElement('div');
      ph.className = 'modal-placeholder';
      ph.style.cssText = 'position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;';
      ph.innerHTML = '<div class="play-circle"><svg width="22" height="22" viewBox="0 0 24 24" fill="rgba(255,255,255,0.5)"><polygon points="5,3 19,12 5,21"/></svg></div><div class="placeholder-label">Video coming soon</div>';
      videoWrap.appendChild(ph);
    }
  } else {
    iframe.src = '';
    videoWrap.classList.add('hidden');
    videoWrap.querySelector('.modal-placeholder')?.remove();
  }

  document.getElementById('modal-text').textContent = s.story;

  const linksEl = document.getElementById('modal-links');
  if (s.links && s.links.length) {
    linksEl.innerHTML = s.links.map(l => `<a class="modal-link" href="${l.url}" target="_blank">↗ ${l.label}</a>`).join('');
    linksEl.style.display = 'flex';
  } else {
    linksEl.innerHTML = '';
    linksEl.style.display = 'none';
  }

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) closeModalBtn();
}

function closeModalBtn() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modal-iframe').src = '';
  document.body.style.overflow = '';
}

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderGrid();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderGrid();
  });
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalBtn(); });

renderGrid();
</script>
